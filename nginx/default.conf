upstream backend {
    server backend:8000;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    # Docker's internal DNS — re-resolves service names on each upstream
    # connection so that restarted containers with new IPs are found immediately
    # (prevents stale-IP 502 after container restarts).
    resolver 127.0.0.11 valid=5s ipv6=off;
    set $frontend_upstream http://frontend:80;

    client_max_body_size 250M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SSE + gros corps : timeouts longs, pas de buffer disque côté requête vers l’upstream
    location = /api/score-stream {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;

        proxy_connect_timeout 60s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        send_timeout 3600s;
    }

    # API → backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /health {
        proxy_pass http://backend;
    }

    # Tout le reste → frontend (via variable pour forcer la re-résolution DNS)
    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
    }
}
