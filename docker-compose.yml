name: cv-scorer

services:
  nginx:
    container_name: cv-scorer-nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  backend:
    container_name: cv-scorer-backend
    build: ./backend
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:3000}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-10}
      - API_TOKEN=${API_TOKEN:-}
      - REQUIRE_API_TOKEN=${REQUIRE_API_TOKEN:-}
      - CLAUDE_TWO_PASS=${CLAUDE_TWO_PASS:-1}
      - CLAUDE_PROMPT_CACHE=${CLAUDE_PROMPT_CACHE:-1}
      - CV_TEXT_MAX_CHARS=${CV_TEXT_MAX_CHARS:-12000}
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"

  frontend:
    container_name: cv-scorer-frontend
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=
    restart: unless-stopped
    expose:
      - "80"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

networks:
  default:
    name: cv-scorer-net
